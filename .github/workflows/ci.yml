name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff check lint rules
        run: uv run ruff check src/ tests/

      - name: Ruff check formatting
        run: uv run ruff format --check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/tensorrsvd/

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: >
          uv run pytest tests/
          -m "not jax and not cupy"
          --cov=tensorrsvd
          --cov-report=xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-jax:
    name: Test (JAX / ubuntu-latest)
    needs: lint
    runs-on: ubuntu-latest
    env:
      JAX_ENABLE_X64: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run JAX tests
        run: uv run pytest tests/ -m "jax" --tb=short
